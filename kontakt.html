<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kontakt | FoerderCheckPlus</title>
    <meta name="description" content="Nehmen Sie Kontakt mit FoerderCheckPlus auf.">
    <link rel="icon" type="image/png" href="förderchecklogo.png">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .contact-hero {
            padding: 80px 24px 40px;
            text-align: center;
        }
        .contact-form-container {
            max-width: 600px;
            margin: 0 auto 80px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            font-family: 'Poppins', sans-serif;
        }
        [data-theme="dark"] .contact-form-container {
            background: var(--surface-2);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.95rem;
        }
        .form-control {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border-2);
            background: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-l);
        }
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        .form-message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
            display: none;
        }
        .form-message.success {
            display: block;
            background: #ECFDF5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }
        .form-message.error {
            display: block;
            background: #FEF2F2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }
        @media(max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .contact-form-container { padding: 24px; }
        }
    </style>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N4VE8HX6XX');
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N4VE8HX6XX');
    </script>
    <!-- Dark Mode Init (prevents flash) -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }
        else { document.documentElement.removeAttribute('data-theme'); }
      })();
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N4VE8HX6XX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N4VE8HX6XX');
    </script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2068043467304653"
         crossorigin="anonymous"></script>
</head>
<body>
    <script src="header.js"></script>

    <section class="contact-hero">
        <h1 class="page-hero__h1">Kontakt</h1>
        <p class="page-hero__sub">Sie haben Fragen zu Förderprogrammen, Anregungen oder Hinweise? Schreiben Sie uns einfach.</p>
        <p style="color:var(--text-3); font-size:0.9rem; margin-top:8px;">Wir bemühen uns, Anfragen schnellstmöglich zu beantworten.</p>
    </section>

    <div class="container">
        <div class="contact-form-container">
            <div id="statusMessage" class="form-message"></div>
            
            <form id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Vorname</label>
                        <input type="text" id="firstName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nachname</label>
                        <input type="text" id="lastName" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">E-Mail</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Kategorie der Anfrage</label>
                    <select id="category" class="form-control">
                        <option value="Allgemeine Frage">Allgemeine Frage</option>
                        <option value="Förderprogramm">Förderprogramm</option>
                        <option value="Technisches Problem">Technisches Problem</option>
                        <option value="Kooperation">Kooperation</option>
                        <option value="Sonstiges">Sonstiges</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Betreff</label>
                    <input type="text" id="subject" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Nachricht</label>
                    <textarea id="message" class="form-control" required></textarea>
                </div>

                <button type="submit" class="btn--explorer w-full" id="submitBtn" style="width: 100%; border-radius: 12px; padding: 16px;">Nachricht senden</button>
            </form>
        </div>
    <!-- Custom Notification Toast -->
    <div id="toastNotification" style="position:fixed; bottom:24px; right:24px; background:var(--surface); color:var(--text); padding:16px 24px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.15); border:1px solid var(--border); display:flex; align-items:center; gap:12px; z-index:10000; transform:translateY(120px); transition:transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-family:'Poppins', sans-serif;">
        <div style="width:32px; height:32px; background:#ECFDF5; color:#059669; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px;">✓</div>
        <div>
            <div style="font-weight:700; font-size:0.95rem;">Gesendet!</div>
            <div style="font-size:0.85rem; color:var(--text-2);">Danke für deine Nachricht.</div>
        </div>
    </div>

    <script src="footer.js"></script>
    <script src="main.js"></script>
    <script>
        function showNotification() {
            const toast = document.getElementById('toastNotification');
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.transform = 'translateY(120px)';
            }, 6000); // Show for 6 seconds
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            statusMsg.className = 'form-message';
            statusMsg.textContent = '';
            btn.textContent = 'Wird gesendet...';
            btn.disabled = true;

            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                category: document.getElementById('category').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const isDev = ['5500', '5501', '5502', '3001'].includes(window.location.port);
                const baseUrl = isDev ? `${window.location.protocol}//${window.location.hostname}:3000` : '';
                const res = await fetch(`${baseUrl}/api/contact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    showNotification();
                    document.getElementById('contactForm').reset();
                } else {
                    const data = await res.json();
                    statusMsg.className = 'form-message error';
                    statusMsg.textContent = data.error || 'Fehler beim Senden.';
                }
            } catch (err) {
                statusMsg.className = 'form-message error';
                statusMsg.textContent = 'Netzwerkfehler. Bitte prüfen Sie Ihre Verbindung.';
            } finally {
                btn.textContent = 'Nachricht senden';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
