<body>
    <div class="container" style="padding: 24px;">
        <div class="login-card">
            <a href="index.html" class="brand-link">← Zurück zur Startseite</a>
            <h1 class="login-card__title">Admin-Anmeldung</h1>
            <p class="login-card__sub">Bitte melden Sie sich an, um das Dashboard zu öffnen.</p>

            <div id="errorMsg" class="error-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Benutzername</label>
                    <input type="text" id="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Passwort</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Anmelden</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Bitte warten...';
            err.style.display = 'none';

            try {
                const isDev = ['5500', '5501', '5502', '3001'].includes(window.location.port);
                const baseUrl = isDev ? `${window.location.protocol}//${window.location.hostname}:3000` : '';
                const res = await fetch(`${baseUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                if (res.ok) {
                    window.location.href = '/admin.html';
                } else {
                    err.textContent = 'Benutzername oder Passwort falsch.';
                    err.style.display = 'block';
                }
            } catch (error) {
                err.textContent = 'Verbindungsfehler.';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Anmelden';
            }
        });
    </script>
</body>
